name: OVERWATCH — Daily Report

on:
  schedule:
    # Runs at 3:00 AM UTC = 11:00 PM EST
    - cron: '0 3 * * *'
  
  # Manual trigger for testing
  workflow_dispatch:

jobs:
  run-overwatch:
    runs-on: ubuntu-latest
    
    # Permission to write files back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run OVERWATCH
        env:
          JOBNIMBUS_API_KEY: ${{ secrets.JOBNIMBUS_API_KEY }}
          SALESRABBIT_API_KEY: ${{ secrets.SALESRABBIT_API_KEY }}
          OUTPUT_MODE: file
        run: node src/index.js

      - name: Commit report to repository
        run: |
          git config --global user.name "Overwatch Bot"
          git config --global user.email "overwatch@coxroofing.local"
          git add reports/
          git diff --staged --quiet || git commit -m "OVERWATCH Report — $(date +'%Y-%m-%d')"
          git push
